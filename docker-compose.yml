version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: jmbariani-db
    environment:
      POSTGRES_USER: jmbariani
      POSTGRES_PASSWORD: jmbariani_dev
      POSTGRES_DB: jmbariani
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jmbariani"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jmbariani-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./test_invoice:/app/test_invoice
      - ./test_report:/app/test_report
    environment:
      DATABASE_URL: postgresql://jmbariani:jmbariani_dev@db:5432/jmbariani
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jmbariani-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
